<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Estatus Outbound API Test</title>

    <style>

        *{

            font-family:Segoe UI,Arial,sans-serif;
        }

        body{

            background:#f5f6fa;

        }

        h1{

            margin-bottom:30px;

        }

        .card{

            background:white;

            padding:20px;

            border-radius:10px;

            box-shadow:0 0 10px rgba(0,0,0,.08);

            max-width:900px;

        }

        .row{

            margin-bottom:15px;

        }

        label{

            display:block;

            font-weight:bold;

            margin-bottom:5px;

        }

        input{

            width:220px;

            padding:8px;

        }

        button{

            padding:10px 20px;

            margin-right:10px;

            margin-top:10px;

            cursor:pointer;

        }

        pre{

            background:#222;

            color:#00ff90;

            padding:15px;

            overflow:auto;

            height:400px;

            border-radius:8px;

            font-size:13px;

        }

    </style>

</head>

<body>

<div class="card">

<label>

Business Date

</label>

id="businessDate"
type="date">

</div>

<div class="row">

<button onclick="healthCheck()">

</button>

</button>

</button>

</button>

</div>

</html>
