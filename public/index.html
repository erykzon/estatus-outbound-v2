<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Estatus Outbound V2</title>

    <link rel="stylesheet" href="css/styles.css">

</head>

<body>

    <header class="topbar">

        <h1>Estatus Outbound V2</h1>

        <button id="btnRefresh">
            Actualizar
        </button>

    </header>

    <main class="container">

        <section class="info">

            <div class="card">

                <label>Business Date</label>

                <h2 id="businessDate">--</h2>

            </div>

            <div class="card">

                <label>Última actualización</label>

                <h2 id="generatedAt">--</h2>

            </div>

        </section>

        <section class="kpis">

    <div class="kpi primary">
        <div class="kpi-title">CN Totales</div>
        <div class="kpi-value" id="kpiCN">0</div>
    </div>

    <div class="kpi success">
        <div class="kpi-title">Piezas</div>
        <div class="kpi-value" id="kpiPieces">0</div>
    </div>

    <div class="kpi orange">
        <div class="kpi-title">Clientes</div>
        <div class="kpi-value" id="kpiCustomers">0</div>
    </div>

    <div class="kpi purple">
        <div class="kpi-title">Almacenes</div>
        <div class="kpi-value" id="kpiWarehouses">0</div>
    </div>

    <div class="kpi teal">
        <div class="kpi-title">Armado</div>
        <div class="kpi-value" id="kpiArmado">0</div>
    </div>

    <div class="kpi red">
        <div class="kpi-title">Laser</div>
        <div class="kpi-value" id="kpiLaser">0</div>
    </div>

</section>
        <section class="table-container">

            <table class="data-table">

               <thead>
                
                <tr>
                
                <th>Warehouse</th>
                
                <th>Cliente</th>
                
                <th>CN</th>
                
                <th>Piezas</th>
                
                <th>Estatus</th>
                
                <th>Unidad</th>
                
                <th>Cita</th>
                
                <th>Salida</th>
                
                <th>Corte</th>
                
                <th>CAT</th>
                
                <th>Laser</th>
                
                <th>Armado</th>
                
                <th>Insumos</th>
                
                </tr>
                
                </thead>

                    <tr>

                        <th>Warehouse</th>
                        <th>Cliente</th>
                        <th>CN</th>
                        <th>Piezas</th>
                        <th>Estatus</th>
                        <th>Unidad</th>
                        <th>Cita</th>
                        <th>Salida</th>

                    </tr>

                </thead>

                <tbody id="tableBody">

                </tbody>

            </table>

        </section>

    </main>

    <script type="module" src="js/app.js"></script>

</body>

</html>
